name: Release

on:
  push:
    tags:
      - 'v*'
      - '*-stable'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-tag:
    name: Validate release tag
    runs-on: ubuntu-latest
    outputs:
      classification: ${{ steps.tag.outputs.classification }}
      version: ${{ steps.tag.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate tag format
        id: tag
        run: |
          chmod +x ./.github/scripts/release-tag.sh
          CLASSIFICATION="$(./.github/scripts/release-tag.sh classify "${GITHUB_REF_NAME}")"
          VERSION="$(./.github/scripts/release-tag.sh version "${GITHUB_REF_NAME}")"

          echo "classification=${CLASSIFICATION}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          if [[ "${CLASSIFICATION}" == "stable" ]]; then
            echo "Stable tag detected (${GITHUB_REF_NAME}); GitHub Release creation is enabled."
          else
            echo "Version tag detected (${GITHUB_REF_NAME}); skipping GitHub Release creation because only '*-stable' tags are production-eligible."
          fi

  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: validate-tag
    if: needs.validate-tag.outputs.classification == 'stable'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Verify dependencies
        run: |
          go mod verify
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Build
        run: make build

      - name: Lint
        run: make lint

      - name: Test
        run: make test

      - name: Create release with generated notes
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release v${{ needs.validate-tag.outputs.version }}
          generate_release_notes: true
          make_latest: true
